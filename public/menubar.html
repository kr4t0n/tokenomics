<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tokenomics</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        bg:      '#0b0f1a',
        surface: '#131826',
        surface2:'#1a2035',
        border:  '#232a3e',
        txt:     '#e4e8f1',
        txt2:    '#8b95b0',
        accent:  '#6c8cff',
        accent2: '#4ecdc4',
        warn:    '#f7b955',
        danger:  '#ff6b6b',
      }
    }
  }
}
</script>
<style>
  body { -webkit-app-region: no-drag; user-select: none; }
  .progress-gradient { background: linear-gradient(90deg, #6c8cff, #4ecdc4); }
  .progress-warn     { background: linear-gradient(90deg, #f7b955, #e89b2d); }
  .progress-danger   { background: linear-gradient(90deg, #ff6b6b, #e04a4a); }
</style>
</head>
<body class="bg-bg text-txt text-sm font-sans leading-relaxed antialiased">

<div class="px-4 pt-4 pb-4">

  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-base font-bold tracking-tight">
      <span class="text-accent">tokenomics</span>
    </h1>
    <div class="flex items-center gap-2">
      <span id="statusDot" class="w-2 h-2 rounded-full bg-accent2"></span>
      <button onclick="loadAll()"
              class="text-txt2 hover:text-txt text-xs transition">Refresh</button>
      <button onclick="toggleSettings()" id="settingsBtn"
              class="text-txt2 hover:text-txt transition" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65
                   1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65
                   1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1
                   0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0
                   0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2
                   2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06
                   a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0
                   1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="hidden mb-4">
    <div class="bg-surface rounded-lg border border-border p-3 space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-[0.65rem] font-semibold text-txt2 uppercase tracking-widest">Settings</span>
        <span id="tokenSourceBadge"
              class="text-[0.6rem] px-1.5 py-0.5 rounded bg-surface2 text-txt2"></span>
      </div>

      <div>
        <label class="text-xs text-txt2 block mb-1">Cursor Session Token</label>
        <input id="tokenInput" type="password" spellcheck="false" autocomplete="off"
               placeholder="Paste your WorkosCursorSessionToken..."
               class="w-full bg-surface2 border border-border rounded px-2 py-1.5
                      text-xs text-txt placeholder-txt2/50
                      focus:outline-none focus:border-accent/60 transition" />
      </div>

      <div class="flex items-center gap-2">
        <button onclick="saveToken()"
                class="px-3 py-1 bg-accent/20 text-accent text-xs rounded
                       hover:bg-accent/30 transition font-medium">Save</button>
        <button onclick="clearToken()"
                class="px-3 py-1 bg-surface2 text-txt2 text-xs rounded
                       hover:bg-danger/20 hover:text-danger transition">Clear</button>
        <button onclick="toggleTokenVisibility()" id="toggleVisBtn"
                class="ml-auto text-txt2 hover:text-txt transition" title="Show/hide token">
          <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <p id="settingsMsg" class="text-[0.6rem] text-txt2 hidden"></p>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="space-y-4">
    <div class="h-10 bg-surface rounded-lg animate-pulse"></div>
    <div class="h-10 bg-surface rounded-lg animate-pulse"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden space-y-4">

    <!-- Section title + token total -->
    <div class="flex items-center justify-between">
      <div id="sectionTitle" class="text-[0.65rem] font-semibold text-txt2 uppercase tracking-widest">Cursor</div>
      <span id="cursorTokenTotal" class="text-[0.6rem] text-txt2"></span>
    </div>

    <!-- Requests progress -->
    <div>
      <div class="flex justify-between text-xs mb-1">
        <span class="text-txt2" id="reqLabel">Requests</span>
        <span><span class="text-txt font-semibold" id="reqText">0 / 0</span></span>
      </div>
      <div class="h-2 bg-surface2 rounded-full overflow-hidden">
        <div id="reqFill"
             class="h-full rounded-full transition-all duration-500 progress-gradient"
             style="width:0%"></div>
      </div>
      <div class="flex justify-between text-[0.6rem] text-txt2 mt-1">
        <span id="reqPct"></span>
        <span id="reqCycle"></span>
      </div>
    </div>

    <!-- On-demand progress -->
    <div>
      <div class="flex justify-between text-xs mb-1">
        <span class="text-txt2" id="demandLabel">On-Demand</span>
        <span class="text-txt font-semibold" id="demandText">$0.00</span>
      </div>
      <div class="h-2 bg-surface2 rounded-full overflow-hidden">
        <div id="demandFill"
             class="h-full rounded-full transition-all duration-500 progress-gradient"
             style="width:0%"></div>
      </div>
      <div class="flex justify-between text-[0.6rem] text-txt2 mt-1">
        <span id="demandDetail"></span>
        <span id="demandLimit"></span>
      </div>
    </div>
  </div>

  <!-- Codex Dashboard -->
  <div id="codexDashboard" class="hidden space-y-4">

    <div class="flex items-center justify-between">
      <div class="text-[0.65rem] font-semibold text-txt2 uppercase tracking-widest">Codex</div>
      <span id="codexTokenTotal" class="text-[0.6rem] text-txt2"></span>
    </div>

    <!-- 5-Hour Quota -->
    <div>
      <div class="flex justify-between text-xs mb-1">
        <span class="text-txt2">5-Hour Quota</span>
        <span class="text-txt font-semibold" id="codex5hText">—</span>
      </div>
      <div class="h-2 bg-surface2 rounded-full overflow-hidden">
        <div id="codex5hFill"
             class="h-full rounded-full transition-all duration-500 progress-gradient"
             style="width:0%"></div>
      </div>
      <div class="flex justify-between text-[0.6rem] text-txt2 mt-1">
        <span id="codex5hPct"></span>
        <span id="codex5hReset"></span>
      </div>
    </div>

    <!-- Weekly Quota -->
    <div>
      <div class="flex justify-between text-xs mb-1">
        <span class="text-txt2">Weekly Quota</span>
        <span class="text-txt font-semibold" id="codexWeeklyText">—</span>
      </div>
      <div class="h-2 bg-surface2 rounded-full overflow-hidden">
        <div id="codexWeeklyFill"
             class="h-full rounded-full transition-all duration-500 progress-gradient"
             style="width:0%"></div>
      </div>
      <div class="flex justify-between text-[0.6rem] text-txt2 mt-1">
        <span id="codexWeeklyPct"></span>
        <span id="codexWeeklyReset"></span>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div id="errorState" class="hidden">
    <div class="text-center py-6 text-txt2">
      <p class="text-xs" id="errorMsg">Could not load data.</p>
    </div>
  </div>

</div>

<script>
const $ = (sel) => document.querySelector(sel);

function fmtTokens(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + "B tokens";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M tokens";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K tokens";
  return n.toLocaleString() + " tokens";
}

function showError(msg) {
  $("#loading").classList.add("hidden");
  $("#dashboard").classList.add("hidden");
  $("#codexDashboard").classList.add("hidden");
  $("#errorState").classList.remove("hidden");
  $("#errorMsg").textContent = msg;
  $("#statusDot").className = "w-2 h-2 rounded-full bg-danger";
}

async function loadAll() {
  $("#loading").classList.remove("hidden");
  $("#dashboard").classList.add("hidden");
  $("#codexDashboard").classList.add("hidden");
  $("#errorState").classList.add("hidden");

  try {
    const [teamRes, usageRes, invoiceRes, hardLimitRes, codexRes, codexTokensRes] = await Promise.all([
      fetch("/api/cursor/team-dashboard"),
      fetch("/api/cursor/usage"),
      fetch("/api/cursor/invoice"),
      fetch("/api/cursor/hard-limit"),
      fetch("/api/codex/usage"),
      fetch("/api/codex/tokens"),
    ]);

    const team = teamRes.ok ? await teamRes.json().catch(() => ({})) : {};
    const usage = usageRes.ok ? await usageRes.json().catch(() => null) : null;

    if (team.isTeamMember) {
      renderTeam(team, usage);
    } else {
      if (!usage) {
        const e = await usageRes.json().catch(() => ({}));
        throw new Error(e.error || `API error ${usageRes.status}`);
      }
      const invoice = invoiceRes.ok ? await invoiceRes.json() : null;
      const hardLimit = hardLimitRes.ok ? await hardLimitRes.json() : null;
      render(usage, invoice, hardLimit);
    }

    const codexTokens = codexTokensRes.ok ? await codexTokensRes.json().catch(() => null) : null;
    const codex = codexRes.ok ? await codexRes.json().catch(() => null) : null;
    const hasQuota = codex && (codex.fiveHour || codex.weekly);
    const hasTokens = codexTokens && codexTokens.totalTokens > 0;

    if (hasQuota || hasTokens) {
      renderCodex(codex, codexTokens);
    }

    $("#statusDot").className = "w-2 h-2 rounded-full bg-accent2";
  } catch (err) {
    console.error(err);
    showError(err.message);
  }
}

function renderTeam(team, usage) {
  $("#sectionTitle").textContent = "Cursor";

  // Token total from usage API
  let cursorTotalTokens = 0;
  if (usage) {
    for (const [key, val] of Object.entries(usage)) {
      if (key === "startOfMonth") continue;
      if (val && typeof val === "object" && typeof val.numTokens === "number") {
        cursorTotalTokens += val.numTokens;
      }
    }
  }
  $("#cursorTokenTotal").textContent = cursorTotalTokens > 0 ? fmtTokens(cursorTotalTokens) : "";

  // Bar 1: Requests (from usage API)
  if (usage) {
    const gpt4 = usage["gpt-4"] || {};
    const used = gpt4.numRequests || 0;
    const limit = gpt4.maxRequestUsage || 0;
    $("#reqLabel").textContent = "Requests";
    if (limit) {
      const pct = Math.min(100, (used / limit) * 100);
      $("#reqText").textContent = `${used.toLocaleString()} / ${limit.toLocaleString()}`;
      $("#reqPct").textContent = pct.toFixed(1) + "%";
      const fill = $("#reqFill");
      fill.style.width = pct + "%";
      fill.className = "h-full rounded-full transition-all duration-500 " +
        (pct > 90 ? "progress-danger" : pct > 70 ? "progress-warn" : "progress-gradient");
    } else {
      $("#reqText").textContent = `${used.toLocaleString()} used`;
      $("#reqPct").textContent = "";
      $("#reqFill").style.width = "0%";
    }
  } else {
    $("#reqLabel").textContent = "Requests";
    $("#reqText").textContent = "—";
    $("#reqFill").style.width = "0%";
    $("#reqPct").textContent = "";
  }

  if (team.cycleEnd) {
    const end = new Date(parseInt(team.cycleEnd));
    const daysLeft = Math.max(0, Math.ceil((end - Date.now()) / 86400000));
    $("#reqCycle").textContent = `${daysLeft}d left`;
  } else if (usage?.startOfMonth) {
    const start = new Date(usage.startOfMonth);
    const end = new Date(start); end.setMonth(end.getMonth() + 1);
    const daysLeft = Math.max(0, Math.ceil((end - Date.now()) / 86400000));
    $("#reqCycle").textContent = `${daysLeft}d left`;
  } else {
    $("#reqCycle").textContent = "";
  }

  // Bar 2: On-demand spend vs per-user limit
  $("#demandLabel").textContent = "On-Demand";
  const spendDollars = (team.spendCents || 0) / 100;
  const limitDollars = team.limitDollars || 0;
  $("#demandText").textContent = `$${spendDollars.toFixed(2)}`;

  if (limitDollars > 0) {
    const pct = Math.min(100, (spendDollars / limitDollars) * 100);
    const fill = $("#demandFill");
    fill.style.width = pct + "%";
    fill.className = "h-full rounded-full transition-all duration-500 " +
      (pct > 90 ? "progress-danger" : pct > 70 ? "progress-warn" : "progress-gradient");
    $("#demandLimit").textContent = `limit $${limitDollars}`;
  } else {
    $("#demandFill").style.width = "0%";
    $("#demandLimit").textContent = spendDollars === 0 ? "none" : "";
  }
  $("#demandDetail").textContent = "";

  $("#loading").classList.add("hidden");
  $("#dashboard").classList.remove("hidden");
}

function render(usage, invoice, hardLimit) {
  // Reset labels for individual view
  $("#sectionTitle").textContent = "Cursor";
  $("#reqLabel").textContent = "Requests";
  $("#demandLabel").textContent = "On-Demand";

  // Total tokens across all models
  let cursorTotalTokens = 0;
  for (const [key, val] of Object.entries(usage)) {
    if (key === "startOfMonth") continue;
    if (val && typeof val === "object" && typeof val.numTokens === "number") {
      cursorTotalTokens += val.numTokens;
    }
  }
  $("#cursorTokenTotal").textContent = cursorTotalTokens > 0 ? fmtTokens(cursorTotalTokens) : "";

  const gpt4 = usage["gpt-4"] || {};
  const used = gpt4.numRequests || 0;
  const limit = gpt4.maxRequestUsage || 0;
  const startOfMonth = usage.startOfMonth;

  // Requests bar
  if (limit) {
    const pct = Math.min(100, (used / limit) * 100);
    $("#reqText").textContent = `${used.toLocaleString()} / ${limit.toLocaleString()}`;
    $("#reqPct").textContent = pct.toFixed(1) + "%";
    const fill = $("#reqFill");
    fill.style.width = pct + "%";
    fill.className = "h-full rounded-full transition-all duration-500 " +
      (pct > 90 ? "progress-danger" : pct > 70 ? "progress-warn" : "progress-gradient");
  } else {
    $("#reqText").textContent = `${used.toLocaleString()} used`;
    $("#reqPct").textContent = "";
    $("#reqFill").style.width = "0%";
  }

  if (startOfMonth) {
    const start = new Date(startOfMonth);
    const end = new Date(start); end.setMonth(end.getMonth() + 1);
    const daysLeft = Math.max(0, Math.ceil((end - Date.now()) / 86400000));
    $("#reqCycle").textContent = `${daysLeft}d left`;
  }

  // On-demand bar
  let totalCents = 0;
  let totalReqs = 0;
  if (invoice?.items) {
    for (const item of invoice.items) {
      if (typeof item.cents === "undefined") continue;
      if (item.description?.includes("Mid-month usage paid")) continue;
      totalCents += item.cents;
      const m = item.description?.match(/^(\d+)/);
      if (m) totalReqs += parseInt(m[1]);
    }
  }

  const totalDollars = totalCents / 100;
  const limitDollars = hardLimit?.noUsageBasedAllowed ? 0 : (hardLimit?.hardLimit || 0);

  $("#demandText").textContent = `$${totalDollars.toFixed(2)}`;

  if (limitDollars > 0) {
    const pct = Math.min(100, (totalDollars / limitDollars) * 100);
    $("#demandFill").style.width = pct + "%";
    $("#demandFill").className = "h-full rounded-full transition-all duration-500 " +
      (pct > 90 ? "progress-danger" : pct > 70 ? "progress-warn" : "progress-gradient");
    $("#demandLimit").textContent = `limit $${limitDollars}`;
  } else {
    $("#demandFill").style.width = "0%";
    $("#demandLimit").textContent = totalCents === 0 ? "none" : "";
  }

  $("#demandDetail").textContent = totalReqs > 0 ? `${totalReqs.toLocaleString()} req` : "";

  $("#loading").classList.add("hidden");
  $("#dashboard").classList.remove("hidden");
}

// ---------------------------------------------------------------------------
// Codex rendering
// ---------------------------------------------------------------------------

function formatResetCountdown(isoString) {
  if (!isoString) return "";
  const ms = new Date(isoString).getTime() - Date.now();
  if (ms <= 0) return "resetting...";
  const hours = Math.floor(ms / 3600000);
  const mins = Math.ceil((ms % 3600000) / 60000);
  if (hours >= 24) {
    const days = Math.floor(hours / 24);
    const remHours = hours % 24;
    return `resets in ${days}d ${remHours}h`;
  }
  if (hours > 0) return `resets in ${hours}h ${mins}m`;
  return `resets in ${mins}m`;
}

function quotaBarClass(pctUsed) {
  if (pctUsed > 90) return "progress-danger";
  if (pctUsed > 70) return "progress-warn";
  return "progress-gradient";
}

function renderCodex(data, tokens) {
  // Token total
  if (tokens && tokens.totalTokens > 0) {
    $("#codexTokenTotal").textContent = fmtTokens(tokens.totalTokens);
  } else {
    $("#codexTokenTotal").textContent = "";
  }

  if (data && data.fiveHour) {
    const pctLeft = data.fiveHour.percentLeft;
    const pctUsed = Math.max(0, 100 - pctLeft);
    $("#codex5hText").textContent = `${pctLeft.toFixed(0)}% left`;
    $("#codex5hFill").style.width = pctUsed + "%";
    $("#codex5hFill").className = "h-full rounded-full transition-all duration-500 " + quotaBarClass(pctUsed);
    $("#codex5hPct").textContent = pctUsed > 0 ? pctUsed.toFixed(1) + "% used" : "";
    $("#codex5hReset").textContent = formatResetCountdown(data.fiveHour.resetAt);
  } else {
    $("#codex5hText").textContent = "—";
    $("#codex5hFill").style.width = "0%";
    $("#codex5hPct").textContent = "";
    $("#codex5hReset").textContent = "";
  }

  if (data && data.weekly) {
    const pctLeft = data.weekly.percentLeft;
    const pctUsed = Math.max(0, 100 - pctLeft);
    $("#codexWeeklyText").textContent = `${pctLeft.toFixed(0)}% left`;
    $("#codexWeeklyFill").style.width = pctUsed + "%";
    $("#codexWeeklyFill").className = "h-full rounded-full transition-all duration-500 " + quotaBarClass(pctUsed);
    $("#codexWeeklyPct").textContent = pctUsed > 0 ? pctUsed.toFixed(1) + "% used" : "";
    $("#codexWeeklyReset").textContent = formatResetCountdown(data.weekly.resetAt);
  } else {
    $("#codexWeeklyText").textContent = "—";
    $("#codexWeeklyFill").style.width = "0%";
    $("#codexWeeklyPct").textContent = "";
    $("#codexWeeklyReset").textContent = "";
  }

  $("#codexDashboard").classList.remove("hidden");
  requestAnimationFrame(() => console.log("__resize__"));
}

// ---------------------------------------------------------------------------
// Settings panel
// ---------------------------------------------------------------------------

function toggleSettings() {
  const panel = $("#settingsPanel");
  const isHidden = panel.classList.contains("hidden");
  panel.classList.toggle("hidden");
  if (isHidden) loadSettings();
  requestAnimationFrame(() => console.log("__resize__"));
}

function toggleTokenVisibility() {
  const input = $("#tokenInput");
  input.type = input.type === "password" ? "text" : "password";
}

async function loadSettings() {
  try {
    const res = await fetch("/api/settings");
    const data = await res.json();
    const badge = $("#tokenSourceBadge");
    const sourceLabels = {
      settings: "custom token",
      "local-db": "auto-detected",
      none: "not configured",
    };
    badge.textContent = sourceLabels[data.tokenSource] || data.tokenSource;
    badge.className = "text-[0.6rem] px-1.5 py-0.5 rounded " +
      (data.tokenSource === "none"
        ? "bg-danger/20 text-danger"
        : data.tokenSource === "settings"
          ? "bg-accent/20 text-accent"
          : "bg-accent2/20 text-accent2");
    $("#tokenInput").value = "";
    $("#tokenInput").placeholder = data.hasToken
      ? data.maskedToken
      : "Paste your WorkosCursorSessionToken...";
  } catch {}
}

function showSettingsMsg(text, isError) {
  const el = $("#settingsMsg");
  el.textContent = text;
  el.className = "text-[0.6rem] " + (isError ? "text-danger" : "text-accent2");
  el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 3000);
}

async function saveToken() {
  const token = $("#tokenInput").value.trim();
  if (!token) return showSettingsMsg("Paste a token first", true);

  try {
    const res = await fetch("/api/settings/token", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || "Failed to save");
    }
    showSettingsMsg("Token saved — refreshing...", false);
    $("#tokenInput").value = "";
    await loadSettings();
    loadAll();
  } catch (err) {
    showSettingsMsg(err.message, true);
  }
}

async function clearToken() {
  try {
    await fetch("/api/settings/token", { method: "DELETE" });
    showSettingsMsg("Custom token cleared", false);
    await loadSettings();
    loadAll();
  } catch (err) {
    showSettingsMsg(err.message, true);
  }
}

loadAll();
</script>
</body>
</html>
